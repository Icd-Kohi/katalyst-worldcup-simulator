<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador FIFA WorldCup 2026</title>
    <link rel="stylesheet" href="./src/styles/style.css" />
  </head>

  <body>
    <main class="app">
      <section class="intro">
        <div>
          <h1>Simulador FIFA WorldCup</h1>
          <p> Icd-Kohi <p>
        </div>

        <form class="control-panel" id="controls">
          <button type="submit" id="simulate-button">Simular</button>
        </form>
      </section>

      <section class="status-bar" id="status" aria-live="polite">
        Pronto para simular.
      </section>

      <section class="summary-grid" id="summary" hidden></section>

      <nav class="phase-nav" id="phase-nav" aria-label="Tournament phases" hidden>
        <button type="button" class="secondary-button" id="previous-phase">Anterior</button>
        <div>
          <p class="size2">Fase</p>
          <strong id="phase-label">Grupos</strong>
        </div>
        <button type="button" class="secondary-button" id="next-phase">Proximo</button>
        <div class="phase-tabs" id="phase-tabs"></div>
      </nav>

      <section class="section-block phase-screen" id="groups-section" data-phase="groups" hidden>
        <div class="section-heading">
          <p class="size2">Sorteio</p>
          <h2>Grupos</h2>
        </div>
        <div class="groups-grid" id="groups"></div>
      </section>

      <section class="section-block phase-screen" id="matches-section" data-phase="matches" hidden>
        <div class="section-heading">
          <p class="size2">Fase de grupos</p>
          <h2>Jogos e Resultados</h2>
        </div>
        <div class="matches-grid" id="group-matches"></div>
      </section>

      <section class="section-block phase-screen" id="standings-section" data-phase="standings" hidden>
        <div class="section-heading">
          <p class="size2">Qualificação</p>
          <h2>Classificação</h2>
        </div>
        <div class="standings-grid" id="standings"></div>
      </section>

      <section class="section-block phase-screen" id="round-of-16-section" data-phase="roundOf16" hidden>
        <div class="section-heading">
          <p class="size2">Eliminatórias</p>
          <h2>Oitavas de final</h2>
        </div>
        <div class="bracket-grid single-round" id="round-of-16"></div>
      </section>

      <section class="section-block phase-screen" id="quarterfinals-section" data-phase="quarterfinals" hidden>
        <div class="section-heading">
          <p class="size2">Eliminatórias</p>
          <h2>Quartas de final</h2>
        </div>
        <div class="bracket-grid single-round" id="quarterfinals"></div>
      </section>

      <section class="section-block phase-screen" id="semifinals-section" data-phase="semifinals" hidden>
        <div class="section-heading">
          <p class="size2">Eliminatórias</p>
          <h2>Semifinais</h2>
        </div>
        <div class="bracket-grid single-round" id="semifinals"></div>
      </section>

      <section class="section-block phase-screen" id="final-section" data-phase="final" hidden>
        <div class="section-heading">
          <p class="size2">Eliminatórias</p>
          <h2>Final</h2>
        </div>
        <div class="bracket-grid single-round final-round" id="final-round"></div>
      </section>

      <section class="section-block phase-screen champion-block" id="champion-section" data-phase="champion" hidden>
        <div id="champion"></div>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
